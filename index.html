<body>

  <header class="site-header">
    <div class="container">
      <h1 class="site-title"><a href="index.html">Notes on Consciousness &amp; AI</a></h1>
      <button class="theme-toggle" onclick="cycleTheme()" aria-label="Switch theme">midnight</button>
    </div>
  </header>

  <main>
    <div class="container">

      <div class="section-label">Writings</div>

      <ul class="article-list">

        <li>
          <a href="articles/article2.html">

              <span>May 2026</span>

        </li>

        <li>

        </li>

  <footer class="site-footer">

      <p>Just a personal archive of thoughts :)&ensp;<a href="https://x.com/herooffjustice" target="_blank" rel="noopener" class="footer-x"><img src="assets/profile.jpg" alt="X profile" class="footer-avatar"></a></p>
    </div>
  </footer>

  <script>
    const themes = ['dark', 'light', 'sepia', 'midnight'];
    const root = document.documentElement;
    const stored = localStorage.getItem('theme');
    if (stored && themes.includes(stored)) {
      root.setAttribute('data-theme', stored);
    }
    function cycleTheme() {
      const current = root.getAttribute('data-theme') || 'dark';
      const next = themes[(themes.indexOf(current) + 1) % themes.length];
      root.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.querySelectorAll('.theme-toggle').forEach(b => b.textContent = next);
    }
    document.querySelectorAll('.theme-toggle').forEach(b => {
      b.textContent = root.getAttribute('data-theme');
    });
  </script>

</body>
</html>
